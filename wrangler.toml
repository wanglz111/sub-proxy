name = "sub-proxy"
main = "src/index.js"
compatibility_date = "2025-12-03"
preview_urls = false

routes = [
  { pattern = "sub.gleaftex.com", zone_name = "gleaftex.com", custom_domain = true }
]

[[r2_buckets]]
binding = "SUB_BUCKET"
bucket_name = "sub"

[vars]
# Optional. If set, all subscription endpoints require ?token=ADMIN_TOKEN
# / ?token=ACCESS_TOKEN or Authorization: Bearer <token>.
REQUIRE_SUB_TOKEN = "true"

[observability]
enabled = true

[observability.logs]
enabled = true
